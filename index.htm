<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steem Block Archeologist - SDS Edition</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #3b82f6; --accent-gold: #f59e0b;
            --color-prime: #818cf8; --bg-prime: #1e1b4b; --border-prime: #4338ca;
            --color-fib: #34d399; --bg-fib: #064e3b; --border-fib: #047857;
            --color-mile: #fb923c; --bg-mile: #7c2d12; --border-mile: #9a3412;
            --color-bin: #4ade80; --bg-bin: #14532d; --border-bin: #15803d;
            --color-even: #a7f3d0; --bg-even: #065f46; --border-even: #047857;
            --color-odd: #fbcfe8; --bg-odd: #831843; --border-odd: #9d174d;
            --color-pal: #f472b6; --bg-pal: #500724; --border-pal: #701a75;
            --color-harshad: #67e8f9; --bg-harshad: #164e63; --border-harshad: #0e7490;
            --color-biclass: #c084fc; --bg-biclass: #3b0764; --border-biclass: #581c87;
            --color-radar: #38bdf8; --bg-radar: #0c4a6e; --border-radar: #0369a1;
            --color-happy: #34d399; --bg-happy: #14532d; --border-happy: #166534;
            --color-bookend: #93c5fd; --bg-bookend: #1e3a8a; --border-bookend: #1d4ed8;
            --color-mill: #f43f5e; --bg-mill: #4c0519; --border-mill: #9f1239;
            --color-zeroes: #e2e8f0; --bg-zeroes: #334155; --border-zeroes: #475569;
            --color-kind: #a855f7; --bg-kind: #2e1065; --border-kind: #6b21a8;
            --color-std: #cbd5e1; --bg-std: #334155; --border-std: #475569;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
       .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { margin-bottom: 0.5rem; color: #f1f5f9; }
        p { color: var(--text-muted); margin-top: 0; }
       .search-box { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        input { flex: 1; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid #334155; background-color: #0f172a; color: white; font-size: 1rem; }
        button { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; background-color: var(--accent); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
       .summary-dashboard { background-color: #111827; border: 1px solid #1f2937; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 2rem; display: none; }
       .summary-title { font-size: 1.1rem; font-weight: 600; color: #f3f4f6; margin-bottom: 1rem; border-bottom: 1px solid #374151; padding-bottom: 0.5rem; }
       .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; }
       .summary-stat { background-color: var(--card-bg); border: 1px solid #334155; border-radius: 0.5rem; padding: 0.5rem; text-align: center; }
       .stat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
       .stat-val { font-size: 1.25rem; font-weight: 700; }
       .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
       .card { background-color: var(--card-bg); border: 1px solid #334155; border-radius: 0.75rem; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
       .card.king { border-color: var(--accent-gold); box-shadow: 0 12px rgba(245, 158, 11, 0.2); }
       .card-top-row { display: flex; justify-content: space-between; align-items: center; }
       .crown-badge { background-color: rgba(245, 158, 11, 0.15); color: var(--accent-gold); padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
       .dominance-note { font-size: 0.78rem; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 0.4rem 0.5rem; border-radius: 0.375rem; }
       .block-num { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; }
       .burn-val { font-family: monospace; font-size: 0.95rem; color: #38bdf8; }
       .badges-container { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
       .badge { font-size: 0.7rem; font-weight: 700; padding: 0.25rem 0.5rem; border-radius: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
       .status { text-align: center; color: var(--text-muted); font-style: italic; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Steem Block Archeologist</h1>
        <p>Deep-scan full history for @null burns - SDS fast edition</p>
    </header>
    <div class="search-box">
        <input type="text" id="username" placeholder="Enter Steem username (e.g., remlaps)" value="">
        <button id="scan-btn" onclick="scanBurnHistory()">Scan Entire History</button>
    </div>
    <div id="status" class="status"></div>
    <div id="summary-dashboard" class="summary-dashboard">
        <div class="summary-title">Archeology Metrics Summary</div>
        <div class="summary-grid" id="summary-grid"></div>
    </div>
    <div id="results" class="results-grid"></div>
</div>

<script>
    // --- math helpers ---
    function isPrime(n){ if(n<=1)return false; if(n<=3)return true; if(n%2===0||n%3===0)return false; for(let i=5;i*i<=n;i+=6){if(n%i===0||n%(i+2)===0)return false} return true }
    function isPerfectSquare(x){let s=Math.floor(Math.sqrt(x));return s*s===x}
    function isFibonacci(n){return isPerfectSquare(5*n*n+4)||isPerfectSquare(5*n*n-4)}
    function isBinary(n){return /^[01]+$/.test(n.toString())}
    function isMilestone(n){return n%100===0}
    function isPalindrome(s){return s===s.split('').reverse().join('')}
    function isHarshad(n,s){let sum=0;for(let c of s)sum+=+c;return sum>0&&n%sum===0}
    function isBiClass(s){return new Set(s).size===2}
    function isRadar(s){if(s.length%2)return false;let h=s.length/2;return s.slice(0,h)===s.slice(h)}
    function isHappyNumber(n){let seen=new Set();while(n!==1&&!seen.has(n)){seen.add(n);let sum=0;while(n>0){let d=n%10;sum+=d*d;n=Math.floor(n/10)}n=sum}return n===1}
    function is3DigitBookend(s){return s.length>=6&&s.slice(0,3)===s.slice(-3)}
    function isMillennium(n){return n%1000===0}
    function has4To8Zeroes(s){let m=s.match(/0+$/);return m&&m[0].length>=4&&m[0].length<=8}
    function is5To10OfAKind(s){let c={};for(let ch of s)c[ch]=(c[ch]||0)+1;return Object.values(c).some(v=>v>=5&&v<=10)}
    const sleep=ms=>new Promise(r=>setTimeout(r,ms));

    function resolveColIdx(cols,name,fallback){
        if(Array.isArray(cols)){let i=cols.indexOf(name);return i===-1?fallback:i}
        if(cols&&typeof cols==='object'){if(cols[name]!==undefined)return cols[name];let i=Object.keys(cols).indexOf(name);return i===-1?fallback:i}
        return fallback
    }

    async function fetchAllNullBurns(fromTime,toTime,statusDiv){
        const limit=1000;let offset=0;const burnsByKey={};
        while(true){
            const q={type:"transfer",to:"null",fromTime,toTime};
            const url=`https://sds.steemworld.org/transfers_api/getTransfers/${encodeURIComponent(JSON.stringify(q))}/${limit}/${offset}`;
            statusDiv.innerText=`Pre-loading global @null ledger (${offset.toLocaleString()} records)...`;
            const r=await fetch(url);const d=await r.json();
            if(!d?.result?.rows)break;
            const rows=d.result.rows,cols=d.result.cols;
            const ti=resolveColIdx(cols,'time',resolveColIdx(cols,'timestamp',0));
            const fi=resolveColIdx(cols,'from',1);
            const ai=resolveColIdx(cols,'amount',3);
            const ui=resolveColIdx(cols,'unit',resolveColIdx(cols,'symbol',4));
            for(const row of rows){const k=`${row[ti]}|${row[ui]}`;(burnsByKey[k]||(burnsByKey[k]=[])).push({from:row[fi],amount:+row[ai]||0})}
            if(rows.length<limit)break;offset+=limit;
        }
        return burnsByKey;
    }

    function lookupDominance(map,acct,amt,sym,ts){
        if(ts==null)return null;
        const rows=map[`${ts}|${sym}`]||[];
        const m={};for(const {from,amount} of rows)m[from]=(m[from]||0)+amount;
        if(!(acct in m))m[acct]=amt;
        let max=m[acct],king=acct,high=true;
        for(const [w,t] of Object.entries(m)){if(t>max){max=t;king=w;high=false}}
        return{isHighest:high,kingAccount:king,maxBurn:max,competitorsCount:Object.keys(m).length};
    }

    // --- FAST SDS fetch for all burns from user to null ---
    async function fetchAllUserBurns(username,statusDiv){
        const limit=1000;let offset=0;const found=[];
        const query={type:"transfer",from:username,to:"null"};
        while(true){
            statusDiv.innerText=`Loading @null burns from SDS (${found.length.toLocaleString()} found)...`;
            const url=`https://sds.steemworld.org/transfers_api/getTransfers/${encodeURIComponent(JSON.stringify(query))}/${limit}/${offset}`;
            const r=await fetch(url);const d=await r.json();
            if(!d?.result?.rows)break;
            const rows=d.result.rows,cols=d.result.cols;
            const bi=resolveColIdx(cols,'block',resolveColIdx(cols,'block_num',0));
            const ti=resolveColIdx(cols,'time',resolveColIdx(cols,'timestamp',1));
            const ai=resolveColIdx(cols,'amount',2);
            const ui=resolveColIdx(cols,'unit',resolveColIdx(cols,'symbol',3));
            for(const row of rows){
                const block=row[bi],ts=row[ti],amt=+row[ai]||0,unit=row[ui]||'STEEM';
                if(!block||amt<=0)continue;
                found.push({blockNum:block,burnAmount:`${amt} ${unit}`,timestamp:ts});
            }
            if(rows.length<limit)break;offset+=limit;await sleep(80);
        }
        return found.reverse(); // oldest first
    }

    async function scanBurnHistory(){
        const username=document.getElementById('username').value.trim().toLowerCase();
        const status=document.getElementById('status');
        const results=document.getElementById('results');
        const dash=document.getElementById('summary-dashboard');
        const btn=document.getElementById('scan-btn');
        if(!username){status.innerText='Please enter a username.';return}
        btn.disabled=true;results.innerHTML='';dash.style.display='none';
        try{
            const foundBlocks=await fetchAllUserBurns(username,status);
            if(!foundBlocks.length){status.innerText='No @null burns found.';btn.disabled=false;return}
            status.innerText=`Found ${foundBlocks.length} burns. Preloading global ledger...`;
            const times=foundBlocks.map(b=>b.timestamp).filter(Boolean);
            const burnsByKey=await fetchAllNullBurns(Math.min(...times),Math.max(...times),status);
            const kings=[];
            for(const item of foundBlocks){
                const [a,s]=item.burnAmount.split(' ');
                const dom=lookupDominance(burnsByKey,username,+a,s,item.timestamp);
                if(dom?.isHighest)kings.push({item,dominance:dom});
            }
            status.innerText=`Rendering ${kings.length} burn-king blocks...`;
            results.innerHTML=kings.map(({item,dominance})=>{
                const n=item.blockNum,s=''+n;
                const badges=[];
                if(n%2===0)badges.push('Even');else badges.push('Odd');
                if(isPalindrome(s))badges.push('Palindrome');
                if(isHarshad(n,s))badges.push('Harshad');
                if(isBiClass(s))badges.push('Bi-Class');
                if(isRadar(s))badges.push('Radar');
                if(isHappyNumber(n))badges.push('Happy');
                if(is3DigitBookend(s))badges.push('Bookend');
                if(isMillennium(n))badges.push('Millennium');
                if(has4To8Zeroes(s))badges.push('4-8 Zeroes');
                if(is5To10OfAKind(s))badges.push('5-10 Kind');
                if(isPrime(n))badges.push('Prime');
                if(isFibonacci(n))badges.push('Fibonacci');
                if(isMilestone(n))badges.push('Century');
                if(isBinary(n))badges.push('Binary');
                return `<div class="card king"><div class="card-top-row"><div class="block-num">Block #${n.toLocaleString()}</div><span class="crown-badge">👑 Burn King</span></div><div class="burn-val">Burned: ${item.burnAmount}</div><div class="dominance-note">${dominance.competitorsCount>1?`Dominated ${dominance.competitorsCount-1} others`:'Solo burner'}</div><div class="badges-container">${badges.map(b=>`<span class="badge">${b}</span>`).join('')}</div></div>`;
            }).join('');
            dash.style.display='block';
            status.innerText=`Complete! ${foundBlocks.length} total burns, ${kings.length} were kings.`;
        }catch(e){console.error(e);status.innerText='Error: '+e.message}
        finally{btn.disabled=false}
    }
</script>
</body>
</html>
